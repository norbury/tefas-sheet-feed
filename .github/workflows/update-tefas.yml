name: Update TEFAS bulk data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Run updater
        run: python scripts/update_tefas.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/tefas_bulk.json
          git diff --cached --quiet || git commit -m "Update TEFAS bulk data"
          git push
